<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊聊 ChatSpace - 在线社交聊天</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <!-- ============ 登录/注册页 ============ -->
    <div class="auth-page" id="auth-page">
        <div class="auth-bubbles">
            <div class="bubble b1"></div><div class="bubble b2"></div>
            <div class="bubble b3"></div><div class="bubble b4"></div>
            <div class="bubble b5"></div><div class="bubble b6"></div>
        </div>
        <div class="auth-container">
            <div class="auth-logo">
                <div class="logo-icon">💬</div>
                <h1>聊聊</h1>
                <p class="auth-subtitle">真正的在线社交聊天平台</p>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">登录</button>
                <button class="auth-tab" data-tab="register">注册</button>
            </div>
            <form class="auth-form" id="login-form">
                <div class="input-group">
                    <input type="text" id="login-username" placeholder="用户名" autocomplete="username" required>
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" placeholder="密码" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-primary btn-block">登录</button>
                <p class="auth-hint">新用户？点击上方"注册"创建账号</p>
            </form>
            <form class="auth-form hidden" id="register-form">
                <div class="input-group">
                    <input type="text" id="reg-username" placeholder="用户名 (2-20字符)" autocomplete="username" required>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-password" placeholder="密码 (至少4位)" autocomplete="new-password" required>
                </div>
                <div class="input-group">
                    <input type="text" id="reg-nickname" placeholder="昵称 (选填)">
                </div>
                <div class="input-group">
                    <input type="text" id="reg-bio" placeholder="个性签名 (选填)">
                </div>
                <button type="submit" class="btn-primary btn-block">注册</button>
                <p class="auth-hint">已有账号？点击上方"登录"</p>
            </form>
        </div>
    </div>

    <!-- ============ 主应用 ============ -->
    <div class="main-app hidden" id="main-app">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="nav-avatar" id="nav-avatar"></div>
            </div>
            <div class="nav-items">
                <button class="nav-item active" data-view="chats" title="消息">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span class="nav-badge hidden" id="msg-badge">0</span>
                </button>
                <button class="nav-item" data-view="contacts" title="通讯录">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </button>
                <button class="nav-item" data-view="moments" title="动态">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="12" y1="8" x2="12" y2="16"/></svg>
                </button>
                <button class="nav-item" data-view="discover" title="发现">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
                </button>
                <button class="nav-item hidden" data-view="admin" id="nav-admin" title="管理后台">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </button>
            </div>
            <div class="sidebar-bottom">
                <button class="nav-item" onclick="App.logout()" title="退出登录">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </nav>

        <div class="content-area">
            <!-- 聊天列表 -->
            <div class="view view-chats" id="view-chats">
                <div class="list-panel">
                    <div class="panel-header"><h2>消息</h2></div>
                    <div class="search-box"><input type="text" placeholder="搜索聊天..." id="chat-search"></div>
                    <div class="chat-list" id="chat-list"></div>
                </div>
                <div class="detail-panel" id="chat-detail">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="var(--text-light)" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <p>选择一个聊天开始对话</p>
                    </div>
                </div>
            </div>

            <!-- 通讯录 -->
            <div class="view view-contacts hidden" id="view-contacts">
                <div class="full-panel">
                    <div class="panel-header"><h2>通讯录</h2></div>
                    <div class="search-box"><input type="text" placeholder="搜索好友..." id="contact-search"></div>
                    <div class="contacts-list" id="contacts-list"></div>
                </div>
            </div>

            <!-- 动态广场 -->
            <div class="view view-moments hidden" id="view-moments">
                <div class="full-panel">
                    <div class="panel-header">
                        <h2>动态广场</h2>
                        <button class="btn-primary btn-sm" onclick="App.showPostMomentModal()">+ 发动态</button>
                    </div>
                    <div class="moments-list" id="moments-list"></div>
                </div>
            </div>

            <!-- 发现 -->
            <div class="view view-discover hidden" id="view-discover">
                <div class="full-panel">
                    <div class="panel-header"><h2>发现</h2></div>
                    <div class="discover-content" id="discover-content"></div>
                </div>
            </div>

            <!-- 管理后台 -->
            <div class="view view-admin hidden" id="view-admin">
                <div class="full-panel">
                    <div class="panel-header"><h2>管理后台</h2></div>
                    <div class="admin-tabs">
                        <button class="admin-tab active" data-tab="admin-users">用户管理</button>
                        <button class="admin-tab" data-tab="admin-moments">动态管理</button>
                        <button class="admin-tab" data-tab="admin-stats">数据统计</button>
                    </div>
                    <div class="admin-content" id="admin-content"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal-overlay hidden" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header"><h3 id="modal-title"></h3><button class="modal-close" onclick="App.closeModal()">✕</button></div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <div class="image-preview-overlay hidden" id="image-preview-overlay" onclick="this.classList.add('hidden')"><img id="image-preview-img" src="" alt=""></div>

    <script src="/js/app.js"></script>
</body>
</html>
