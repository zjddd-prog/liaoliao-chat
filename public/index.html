<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title data-i18n="app.title">飞友之家 - 在线社交聊天</title>
    <link rel="stylesheet" href="/css/style.css?v=323">
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/i18n.js?v=323"></script>
</head>
<body>
    <!-- ============ 登录/注册页 ============ -->
    <div class="auth-page" id="auth-page">
        <div class="auth-bubbles">
            <div class="bubble b1"></div><div class="bubble b2"></div>
            <div class="bubble b3"></div><div class="bubble b4"></div>
            <div class="bubble b5"></div><div class="bubble b6"></div>
        </div>
        <div class="auth-container">
            <div class="auth-logo">
                <div class="logo-icon">💬</div>
                <h1 data-i18n="app.name">飞友之家</h1>
                <p class="auth-subtitle" data-i18n="app.subtitle">真正的在线社交聊天平台</p>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login" data-i18n="auth.login">登录</button>
                <button class="auth-tab" data-tab="register" data-i18n="auth.register">注册</button>
            </div>
            <form class="auth-form" id="login-form">
                <div class="input-group">
                    <input type="text" id="login-username" data-i18n-placeholder="auth.username" placeholder="用户名" autocomplete="username" required>
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" data-i18n-placeholder="auth.password" placeholder="密码" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-primary btn-block" data-i18n="auth.login">登录</button>
                <p class="auth-hint" data-i18n="auth.noAccount">新用户？点击上方"注册"创建账号</p>
            </form>
            <form class="auth-form hidden" id="register-form">
                <div class="input-group">
                    <input type="text" id="reg-username" data-i18n-placeholder="auth.usernameHint" placeholder="用户名 (2-20字符)" autocomplete="username" required>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-password" data-i18n-placeholder="auth.passwordHint" placeholder="密码 (至少4位)" autocomplete="new-password" required>
                </div>
                <div class="input-group">
                    <input type="text" id="reg-nickname" data-i18n-placeholder="auth.nickname" placeholder="昵称 (选填)">
                </div>
                <div class="input-group">
                    <input type="text" id="reg-bio" data-i18n-placeholder="auth.bio" placeholder="个性签名 (选填)">
                </div>
                <button type="submit" class="btn-primary btn-block" data-i18n="auth.register">注册</button>
                <p class="auth-hint" data-i18n="auth.hasAccount">已有账号？点击上方"登录"</p>
            </form>
        </div>
    </div>

    <!-- ============ 主应用 ============ -->
    <div class="main-app hidden" id="main-app">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="nav-avatar" id="nav-avatar" onclick="App.showMyProfile()" data-i18n-title="sidebar.myProfile" title="我的主页"></div>
            </div>
            <div class="sidebar-points" id="sidebar-points">
                <div class="points-value" id="points-value">0</div>
                <div class="points-label" data-i18n="sidebar.points">积分</div>
                <button class="checkin-btn" id="checkin-btn" onclick="App.doCheckin()" data-i18n="nav.checkin" data-i18n-title="nav.checkin" title="每日签到">签到</button>
            </div>
            <div class="nav-items">
                <button class="nav-item active" data-view="chats" data-i18n-title="nav.chats" title="消息">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span class="nav-label" data-i18n="nav.chats">消息</span>
                    <span class="nav-badge hidden" id="msg-badge">0</span>
                </button>
                <button class="nav-item" data-view="contacts" data-i18n-title="nav.contacts" title="通讯录">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <span class="nav-label" data-i18n="nav.contacts">通讯录</span>
                </button>
                <button class="nav-item" data-view="discover" data-i18n-title="nav.discover" title="发现">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
                    <span class="nav-label" data-i18n="nav.discover">发现</span>
                </button>
                <button class="nav-item" id="nav-profile" onclick="App.showMyProfile()" data-i18n-title="nav.myProfile" title="我的">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span class="nav-label" data-i18n="nav.myProfile">我的</span>
                </button>
                <button class="nav-item hidden" data-view="moments" id="nav-moments" data-i18n-title="nav.moments" title="动态">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="12" y1="8" x2="12" y2="16"/></svg>
                    <span class="nav-label" data-i18n="nav.moments">动态</span>
                </button>
                <button class="nav-item hidden" data-view="admin" id="nav-admin" data-i18n-title="nav.admin" title="管理后台">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    <span class="nav-label" data-i18n="nav.admin">管理</span>
                </button>
            </div>
            <div class="sidebar-bottom">
                <button class="sidebar-btn" onclick="App.showBubbleShop()" data-i18n-title="nav.bubble" title="气泡商城">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span class="sidebar-btn-label" data-i18n="nav.bubble">气泡</span>
                </button>
                <button class="sidebar-btn" onclick="App.showDonation()" data-i18n-title="nav.donate" title="打赏支持">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                    <span class="sidebar-btn-label" data-i18n="nav.donate">打赏</span>
                </button>
                <button class="sidebar-btn" onclick="App.showCreateGroupModal()" data-i18n-title="nav.createGroup" title="创建群聊">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                    <span class="sidebar-btn-label" data-i18n="nav.createGroup">建群</span>
                </button>
                <button class="sidebar-btn" onclick="App.showLanguageModal()" data-i18n-title="lang.switch" title="语言">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    <span class="sidebar-btn-label" data-i18n="lang.switch">语言</span>
                </button>
                <button class="feedback-btn" onclick="App.showFeedbackModal()" data-i18n-title="nav.feedback" title="问题反馈">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                    <span data-i18n="nav.feedback">反馈</span>
                </button>
                <button class="feedback-btn" onclick="App.logout()" data-i18n-title="nav.logout" title="退出登录">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    <span data-i18n="nav.logout">退出</span>
                </button>
            </div>
        </nav>

        <div class="content-area">
            <!-- 聊天列表 -->
            <div class="view view-chats" id="view-chats">
                <div class="list-panel">
                    <div class="panel-header">
                        <h2 data-i18n="nav.chats">消息</h2>
                        <button class="btn-create-group" onclick="App.showCreateGroupModal()" data-i18n-title="nav.createGroup" title="创建群聊">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                            <span class="btn-create-group-label" data-i18n="nav.createGroup">建群</span>
                        </button>
                    </div>
                    <div class="search-box"><input type="text" data-i18n-placeholder="search.chats" placeholder="搜索聊天..." id="chat-search"></div>
                    <div class="chat-list" id="chat-list"></div>
                </div>
                <div class="detail-panel" id="chat-detail">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="var(--text-light)" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <p data-i18n="chat.empty">选择一个聊天开始对话</p>
                    </div>
                </div>
            </div>

            <!-- 通讯录 -->
            <div class="view view-contacts hidden" id="view-contacts">
                <div class="full-panel">
                    <div class="panel-header"><h2 data-i18n="contacts.title">通讯录</h2></div>
                    <div class="search-box"><input type="text" data-i18n-placeholder="search.friends" placeholder="搜索好友..." id="contact-search"></div>
                    <div class="contacts-list" id="contacts-list"></div>
                </div>
            </div>

            <!-- 动态广场 -->
            <div class="view view-moments hidden" id="view-moments">
                <div class="full-panel">
                    <div class="panel-header">
                        <h2 data-i18n="moments.title">动态广场</h2>
                        <button class="btn-primary btn-sm" onclick="App.showPostMomentModal()" data-i18n="moments.post">+ 发动态</button>
                    </div>
                    <div class="moments-list" id="moments-list"></div>
                </div>
            </div>

            <!-- 发现 -->
            <div class="view view-discover hidden" id="view-discover">
                <div class="full-panel">
                    <div class="panel-header"><h2 data-i18n="discover.title">发现</h2></div>
                    <div class="discover-content" id="discover-content"></div>
                </div>
            </div>

            <!-- 管理后台 -->
            <div class="view view-admin hidden" id="view-admin">
                <div class="full-panel">
                    <div class="panel-header"><h2 data-i18n="admin.title">管理后台</h2></div>
                    <div class="admin-tabs">
                        <button class="admin-tab active" data-tab="admin-users" data-i18n="admin.users">用户管理</button>
                        <button class="admin-tab super-admin-only" data-tab="admin-chats" data-i18n="admin.chats">聊天监控</button>
                        <button class="admin-tab" data-tab="admin-moments" data-i18n="admin.moments">动态管理</button>
                        <button class="admin-tab" data-tab="admin-feedbacks" data-i18n="admin.feedbacks">反馈管理</button>
                        <button class="admin-tab" data-tab="admin-reports" data-i18n="admin.reports">举报管理</button>
                        <button class="admin-tab" data-tab="admin-stats" data-i18n="admin.stats">数据统计</button>
                    </div>
                    <div class="admin-content" id="admin-content"></div>
                </div>
            </div>

            <!-- 用户主页 -->
            <div class="view view-profile hidden" id="view-profile">
                <div class="full-panel">
                    <div class="panel-header">
                        <button class="chat-back-btn" onclick="App.closeProfile()">
                            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                        </button>
                        <h2 data-i18n="profile.title">用户主页</h2>
                    </div>
                    <div class="profile-content" id="profile-content"></div>
                </div>
            </div>

            <!-- 打赏页 -->
            <div class="view view-donation hidden" id="view-donation">
                <div class="full-panel">
                    <div class="panel-header">
                        <button class="chat-back-btn" onclick="App.switchView('chats')">
                            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                        </button>
                        <h2 data-i18n="donate.title">打赏支持</h2>
                        <button class="btn-primary btn-sm" id="donation-upload-btn" onclick="App.showDonationAdmin()" style="display:none;" data-i18n="donate.upload">上传收款码</button>
                    </div>
                    <div class="donation-content" id="donation-content"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal-overlay hidden" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header"><h3 id="modal-title"></h3><button class="modal-close" onclick="App.closeModal()">✕</button></div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <div class="image-preview-overlay hidden" id="image-preview-overlay" onclick="this.classList.add('hidden')"><img id="image-preview-img" src="" alt=""></div>

    <script src="/js/app.js?v=323"></script>
</body>
</html>
